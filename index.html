<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample Web Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f9f9f9;
    }
    header {
      background-color: #4CAF50;
      color: white;
      padding: 15px;
      text-align: center;
    }
    nav {
      margin: 15px 0;
    }
    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #4CAF50;
      font-weight: bold;
    }
    section {
      margin-bottom: 20px;
    }
    footer {
      text-align: center;
      padding: 10px;
      background-color: #ddd;
    }
  </style>
</head>
<body>

  <header>
    <h1>Welcome to My Sample Page</h1>
  </header>

  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>

  <section id="home">
    <h2>Home</h2>
    <p>This is the home section of the sample web page.</p>
  </section>

  <section id="about">
    <h2>About</h2>
    <p>Here you can write a short introduction about yourself or your project.</p>
  </section>

  <section id="contact">
    <h2>Contact</h2>
    <p>Email: <a href="mailto:yourname@example.com">yourname@example.com</a></p>
  </section>

  <footer>
    <p>&copy; 2026 My Sample Page</p>
  </footer>

</body>
</html>
